worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    resolver 127.0.0.11 valid=5s;

    # # Grup API Server (3 Replika)
    # upstream scp_api_cluster {
    #     server api_server:8000;
    # }

    server {
        listen 80;
        
        access_log /var/log/nginx/access.log;
        
        location / {
            set $target_server "";

            # tahap 1 : cek blok_ip
            access_by_lua_file /usr/local/openresty/nginx/conf/lua/block.lua;

            # tahap 2: run Load balance
            rewrite_by_lua_file /usr/local/openresty/nginx/conf/lua/load_balance.lua;
            
            # proxy_pass http://scp_api_cluster;

            # tahap 3: send ke server pilihan tadi
            proxy_pass http://$target_server;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}